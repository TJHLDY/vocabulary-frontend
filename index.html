<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocabNote</title>
<style>
  :root {
    --ink: #1a1a2e;
    --ink-light: #3a3a5c;
    --cream: #faf8f5;
    --paper: #ffffff;
    --accent: #4a6fa5;
    --accent-hover: #3b5a8a;
    --accent-light: #f0f5fc;
    --gold: #c9a96e;
    --gold-light: #f5efe0;
    --border: #e8e4df;
    --error: #d4685c;
    --error-light: #fff5f5;
    --success: #5b9a68;
    --success-light: #f0faf1;
    --warm: #8b7355;
    --warm-light: #f5f2ed;
    --warm-border: #e0d8cc;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.08);
    --radius: 16px;
    --radius-sm: 10px;
  }
  :root[data-theme="dark"] {
    --ink: #e0dcd0;
    --ink-light: #b0aca0;
    --cream: #1a1a2e;
    --paper: #242435;
    --accent: #7eb0d5;
    --accent-hover: #6a9dbc;
    --accent-light: #1e2d3d;
    --gold: #d4c08a;
    --gold-light: #2a2820;
    --border: #3e3e54;
    --error: #e07068;
    --error-light: #2d2020;
    --success: #6aaa78;
    --success-light: #1e2d24;
    --warm: #b0a090;
    --warm-light: #2a2824;
    --warm-border: #4a4538;
    --shadow-sm: none;
    --shadow-md: 0 2px 16px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  button, .sword, .rel-tag, .tab, input, .top-list li, .btn-logout, .speaker-btn, .collapse-toggle-btn, .btn-delete-row, .wb-toggle-btn, .btn-clear, .hist-tag {
    touch-action: manipulation;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--cream);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(74,111,165,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,169,110,0.03) 0%, transparent 50%);
    min-height: 100vh;
    color: var(--ink);
  }

  /* ---- Header ---- */
  .header {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .header .brand {
    font-family: Georgia, 'Noto Serif SC', 'STSong', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--ink);
  }
  .header .brand span { color: var(--accent); }
  .header .right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header .user-badge {
    font-size: 0.85rem;
    color: var(--ink-light);
    background: var(--border);
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: 500;
  }
  .btn-theme {
    background: none;
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
    transition: transform 0.2s;
  }
  .btn-theme:hover { transform: scale(1.2); }
  .btn-feedback {
    background: none;
    border: 1.5px solid var(--gold);
    color: var(--gold);
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.82rem;
    font-family: inherit;
    transition: all 0.15s;
    margin-right: 8px;
  }
  .btn-feedback:hover { background: var(--gold-light); }
  .btn-logout {
    background: none;
    border: 1.5px solid var(--border);
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.82rem;
    font-family: inherit;
    color: #999;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--error); color: var(--error); }

  /* ---- Tab Nav ---- */
  .tab-nav {
    max-width: 780px;
    margin: 32px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 0;
  }
  .tab-nav button {
    flex: 1;
    padding: 14px 0;
    text-align: center;
    font-size: 0.95rem;
    font-weight: 500;
    font-family: inherit;
    background: none;
    border: none;
    border-bottom: 2px solid var(--border);
    cursor: pointer;
    color: #999;
    transition: all 0.2s;
  }
  .tab-nav button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }
  .tab-nav button:hover:not(.active) { color: #666; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ---- Main Content ---- */
  .main {
    max-width: 780px;
    margin: 0 auto;
    padding: 28px 24px 60px;
  }

  /* ---- Search ---- */
  .search-box {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }
  .search-box textarea {
    flex: 1;
    padding: 14px 18px;
    font-size: 1.05rem;
    font-family: inherit;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--paper);
    outline: none;
    color: var(--ink);
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
    overflow-y: hidden;
    line-height: 1.5;
  }
  .search-box textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(74,111,165,0.08);
  }
  .search-box button {
    padding: 14px 28px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: inherit;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .search-box button:hover { background: var(--accent-hover); }
  .search-box button:active { transform: scale(0.97); }
  .search-box button:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ---- Sentence Input ---- */
  .sentence-input {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 28px;
  }
  .sentence-input textarea {
    width: 100%;
    padding: 14px 18px;
    font-size: 1.05rem;
    font-family: inherit;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--paper);
    outline: none;
    color: var(--ink);
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .sentence-input textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(74,111,165,0.08);
  }
  .sentence-input button {
    align-self: flex-end;
    padding: 14px 28px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: inherit;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .sentence-input button:hover { background: var(--accent-hover); }
  .sentence-input button:active { transform: scale(0.97); }
  .sentence-input button:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ---- Result Card ---- */
  .result-card {
    background: var(--paper);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    overflow: hidden;
    animation: fadeIn 0.35s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .speaker-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.15s;
    line-height: 1;
  }
  .speaker-btn:hover { background: var(--gold-light); }

  .collapse-section {
    max-height: 2000px;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .collapse-section.collapsed {
    max-height: 0;
  }

  .collapse-toggle-wrap {
    text-align: center;
    padding: 4px 0 0;
  }
  .collapse-toggle-btn {
    background: none;
    border: none;
    color: #999;
    font-size: 0.78rem;
    cursor: pointer;
    padding: 4px 12px;
    transition: color 0.15s;
  }
  .collapse-toggle-btn:hover { color: var(--accent); }

  .result-card .word-head {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
  }
  .word-head .word-title {
    font-family: Georgia, 'Noto Serif SC', 'STSong', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.5px;
  }
  .word-head .phonetic {
    color: var(--accent);
    font-size: 0.95rem;
    margin-top: 4px;
    font-weight: 400;
  }

  /* Quick translation line */
  .quick-meaning {
    padding: 16px 28px;
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    font-size: 1.05rem;
    color: var(--ink);
    line-height: 1.6;
    white-space: pre-line;
  }
  .quick-meaning .pos-tag {
    display: inline-block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-light);
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 8px;
    vertical-align: middle;
  }

  /* Related words */
  .related-words {
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .related-words .label {
    font-size: 0.8rem;
    color: #999;
    font-weight: 500;
  }
  .related-words .rel-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--gold-light);
    color: var(--ink);
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .related-words .rel-tag:hover { background: var(--gold-light); }
  .related-words .rel-tag .rel-pos {
    font-size: 0.72rem;
    color: var(--gold);
    font-weight: 500;
  }

  .meaning-group {
    padding: 20px 28px;
  }
  .meaning-group + .meaning-group {
    border-top: 1px solid var(--border);
  }
  .part-of-speech {
    display: inline-block;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gold);
    background: var(--gold-light);
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 14px;
  }
  .def-item {
    margin-bottom: 14px;
  }
  .def-item:last-child { margin-bottom: 0; }
  .def-item .def-text {
    font-size: 0.93rem;
    color: var(--ink);
    line-height: 1.6;
  }
  .def-item .def-example {
    font-size: 0.85rem;
    color: #888;
    margin-top: 4px;
    font-style: italic;
    padding-left: 12px;
    border-left: 2px solid var(--border);
  }

  /* ---- Examples Section ---- */
  .examples-section {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
  }
  .examples-section .section-label {
    display: block;
    font-size: 0.76rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #999;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .example-item {
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px dashed var(--border);
  }
  .example-item:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }
  .example-item .example-text {
    font-size: 0.93rem;
    color: var(--ink);
    line-height: 2.0;
    word-spacing: 4px;
  }
  .example-item .example-translation {
    font-size: 0.83rem;
    color: #888;
    margin-top: 6px;
    padding-left: 8px;
    border-left: 3px solid var(--accent);
  }

  /* ---- Sentence Result ---- */
  .sentence-result {
    animation: fadeIn 0.35s ease;
  }
  .sentence-original {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 20px 24px;
    margin-bottom: 16px;
    line-height: 2.2;
    word-spacing: 6px;
  }
  .sword {
    display: inline;
    cursor: pointer;
    padding: 1px 2px;
    margin: 0;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }
  .sword:hover {
    background: var(--accent);
    color: #fff;
  }
  .sword.punct {
    cursor: default;
  }
  .sword.punct:hover {
    background: transparent;
    color: inherit;
  }

  /* Hover tooltip */
  .word-tooltip {
    position: fixed;
    background: var(--ink);
    color: var(--paper);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    pointer-events: none;
    z-index: 9999;
    white-space: pre-line;
    max-width: 320px;
    word-break: break-word;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transition: opacity 0.15s;
  }

  .sentence-translation {
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 20px 24px;
    font-size: 1.05rem;
    color: var(--ink);
    line-height: 1.8;
  }
  .sentence-translation .label {
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #999;
    margin-bottom: 6px;
  }

  /* ---- Sidebar ---- */
  .sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.2);
    z-index: 210;
    display: none;
    animation: fadeOverlay 0.2s ease;
  }
  .sidebar-overlay.show { display: block; }
  @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }

  /* ---- Toast ---- */
  .toast {
    position: fixed;
    bottom: max(20px, calc(20px + env(safe-area-inset-bottom)));
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--paper);
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 0.88rem;
    z-index: 999;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .sidebar {
    position: fixed;
    top: 0;
    right: 0;
    width: 420px;
    max-width: 92vw;
    height: 100vh;
    height: 100dvh;
    background: var(--paper);
    box-shadow: -4px 0 30px rgba(0,0,0,0.12);
    z-index: 211;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .sidebar.show { transform: translateX(0); }
  .sidebar-close {
    position: sticky;
    top: 0;
    background: var(--paper);
    border: none;
    padding: 16px 24px;
    cursor: pointer;
    font-size: 1.3rem;
    color: #999;
    float: right;
    z-index: 1;
    transition: color 0.2s;
  }
  .sidebar-close:hover { color: var(--ink); }
  .sidebar-inner { padding: 0 24px 40px; clear: both; }
  .sidebar-inner .word-title {
    font-family: Georgia, 'Noto Serif SC', 'STSong', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--ink);
  }
  .sidebar-inner .phonetic {
    color: var(--accent);
    font-size: 0.95rem;
    margin: 4px 0 20px;
  }
  .sidebar-inner .quick-meaning {
    padding: 0;
    background: none;
    border: none;
    font-size: 1.05rem;
    margin-bottom: 16px;
  }
  .sidebar-inner .sidebar-related {
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .sidebar-inner .sidebar-related .rel-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--gold-light);
    color: var(--ink);
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .sidebar-inner .sidebar-related .rel-tag:hover { background: var(--gold-light); }
  .sidebar-inner .query-count {
    font-size: 0.82rem;
    color: #999;
    margin-top: 16px;
    text-align: center;
  }
  .sidebar-inner .meaning-group {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-inner .meaning-group:first-of-type { border-top: 1px solid var(--border); margin-top: 6px; }
  .sidebar-inner .part-of-speech { margin-bottom: 8px; }
  .sidebar-inner .def-item { margin-bottom: 10px; }
  .sidebar-inner .def-text { font-size: 0.9rem; line-height: 1.6; }
  .sidebar-inner .def-example {
    font-size: 0.82rem; color: #888; margin-top: 3px;
    font-style: italic; padding-left: 10px;
    border-left: 2px solid var(--border);
  }
  .sb-word-forms { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .sb-wf-label { font-size: 0.75rem; color: #999; font-weight: 500; }
  .sidebar-inner .examples-section {
    padding: 14px 0; border-top: 1px solid var(--border);
  }
  .sidebar-inner .section-label {
    display: block; font-size: 0.76rem; text-transform: uppercase;
    letter-spacing: 1.5px; color: #999; font-weight: 600; margin-bottom: 10px;
  }
  .sidebar-inner .example-item {
    margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px dashed var(--border);
  }
  .sidebar-inner .example-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .sidebar-inner .example-item .example-text {
    font-size: 0.88rem; color: var(--ink); line-height: 1.7; word-spacing: 3px;
  }

  /* Loading, error, empty */
  .loading-spin {
    text-align: center;
    padding: 40px 0;
    color: #999;
    font-size: 0.9rem;
  }
  .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg {
    text-align: center;
    padding: 36px 0;
    color: var(--error);
    font-size: 0.9rem;
  }

  /* ---- Top Words ---- */
  .top-words {
    margin-top: 36px;
  }
  .top-words h2 {
    font-family: Georgia, 'Noto Serif SC', 'STSong', serif;
    font-size: 1.2rem;
    color: var(--ink);
    margin-bottom: 16px;
    font-weight: 600;
  }
  .top-list {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .top-list li {
    background: var(--paper);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.88rem;
    color: var(--ink);
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .top-list li:hover { background: var(--border); }
  .top-list .rank-num {
    font-weight: 700;
    color: var(--accent);
    font-size: 0.82rem;
  }
  .top-list .rank-count {
    color: #aaa;
    font-size: 0.78rem;
  }

  /* ---- My Words Tab ---- */
  .wordbook-empty {
    text-align: center;
    padding: 60px 0;
    color: #bbb;
  }
  .wordbook-empty .icon { font-size: 3rem; margin-bottom: 12px; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .wordbook-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 480px;
  }
  .wordbook-table th {
    text-align: left;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #999;
    padding: 12px 16px;
    border-bottom: 2px solid var(--border);
    font-weight: 600;
  }
  .wordbook-table td {
    padding: 14px 16px;
    font-size: 0.93rem;
    border-bottom: 1px solid var(--border);
    color: var(--ink);
  }
  .wordbook-table .count-badge {
    display: inline-block;
    background: var(--gold-light);
    color: var(--gold);
    font-weight: 600;
    padding: 3px 12px;
    border-radius: 12px;
    font-size: 0.82rem;
  }
  .wordbook-table tbody tr { transition: background 0.15s; cursor: pointer; }
  .wordbook-table tbody tr:hover { background: var(--accent-light); }
  .wordbook-actions { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 12px; }
  .wordbook-actions-left { display: flex; gap: 6px; align-items: center; }
  .wb-toggle-btn { background: none; border: 1px solid var(--warm-border); color: var(--warm); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.15s; }
  .wb-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

<script>
const API = '';
const DICT = '/api/words/dict-proxy';
const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent) || ('ontouchstart' in window && window.innerWidth < 768);
if (isMobile) {
  document.getElementById('wordInput').placeholder = '请输入单词或英文句子';
}
const token = localStorage.getItem('token');

// ---- theme ----
(function() {
  const saved = localStorage.getItem('theme');
  const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.dataset.theme = theme;
  updateThemeBtn(theme);
})();
function toggleTheme() {
  const cur = document.documentElement.dataset.theme;
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('theme', next);
  updateThemeBtn(next);
}
function updateThemeBtn(theme) {
  const btn = document.getElementById('btnTheme');
  if (btn) {
    btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    btn.title = theme === 'dark' ? '日间模式' : '夜间模式';
  }
}

let currentTab = 'search';
let dictationMode = false;
let hideChinese = false;
let _wordbookData = [];
let _wbSearchTimer = null;
let _mobileTooltipWord = null;
let _mobileTooltipTimer = null;
const stopwordsRe = /^(the|a|an|is|are|was|were|be|been|in|on|at|to|for|of|and|or|it|he|she|they|we|you|I|me|him|her|us|them|this|that|these|those|my|your|his|its|our|their|do|does|did|has|have|had|can|could|will|would|shall|should|may|might|must|not|no|yes|but|if|so|as|by|from|with|about|up|out|all|just|only|also|very|too|well|here|there|when|where|why|how|which|who|whom|what)$/;
let userRole = 'user';

fetchUser();
loadTopWords();
loadSentenceHistory();
checkBulletin();
setInterval(checkBulletin, 30000);

// ---- Tab Switching ----
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${tab}`));
  if (_adminRefreshTimer) { clearInterval(_adminRefreshTimer); _adminRefreshTimer = null; }
  if (tab === 'book') loadWordbook();
  if (tab === 'admin') loadAdmin();
  if (tab === 'search') { document.getElementById('wordInput').focus(); loadSentenceHistory(); }
  if (tab === 'quiz') { loadQuizPage(); document.addEventListener('keydown', handleQuizKey); }
  else { _selectedWordIndex = -1; document.removeEventListener('keydown', handleQuizKey); }
}

// ---- Auth helpers ----
async function api(url, options) {
  options = options || {};
  var headers = { 'Authorization': 'Bearer ' + token };
  if (options.body) headers['Content-Type'] = 'application/json';
  var res = await fetch(url, { ...options, headers: { ...headers, ...(options.headers || {}) } });
  var data = await res.json();
  if (data.code === 401) {
    localStorage.removeItem('token');
    showToast(data.msg || '请重新登录');
    setTimeout(function() { location.href = 'login.html'; }, 1200);
    throw new Error(data.msg || '请重新登录');
  }
  return data;
}

async function fetchUser() {
  try {
    const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    const payload = JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));

(function() {
  var _fetch = window.fetch;
  window.fetch = function(url, options) {
    return _fetch.call(window, url, options).then(function(res) {
      var urlStr = typeof url === 'string' ? url : (url && url.url ? url.url : '');
      if (urlStr.indexOf('://') >= 0) return res;
      var ct = res.headers.get('content-type') || '';
      if (ct.indexOf('application/json') === -1) return res;
      return res.clone().json().then(function(data) {
        if (data && data.code === 401) {
          localStorage.removeItem('token');
          showToast(data.msg || '请重新登录');
          setTimeout(function() { location.href = 'login.html'; }, 1200);
          throw new Error(data.msg || '请重新登录');
        }
        return res;
      }).catch(function(e) {
        if (e.message && e.message.indexOf('请重新登录') >= 0) throw e;
        return res;
      });
    });
  };
})();

async function lookup() {
  const input = document.getElementById('wordInput');
  const word = input.value.trim();
  if (!word) return;

  const btn = document.getElementById('searchBtn');
  const area = document.getElementById('resultArea');
  document.getElementById('sentenceArea').innerHTML = '';
  btn.disabled = true;
  btn.textContent = '查询中...';
  area.innerHTML = '<div class="loading-spin"><div class="spinner"></div><div>正在查询...</div></div>';

  try {
    let searchWord = word;
    // If Chinese, translate to English first
    if (isChinese(word)) {
      const tData = await api(`${API}/api/translate`, {
        method: 'POST',
        body: JSON.stringify({ text: word, from: 'zh', to: 'en' })
      });
      if (tData.code === 200 && tData.data && tData.data.translation) {
        searchWord = tData.data.translation;
      } else {
        area.innerHTML = '<div class="error-msg">翻译失败，请重试</div>';
        return;
      }
    }

    // Save to DB and get Chinese translation + relations
    const [saveRes, dictRes] = await Promise.allSettled([
      fetch(`${API}/api/words?word=${encodeURIComponent(searchWord)}`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
      }),
      fetch(`${DICT}/${encodeURIComponent(searchWord)}`)
    ]);

    let dbData = null;
    if (saveRes.status === 'fulfilled' && saveRes.value.ok) {
      const json = await saveRes.value.json();
      if (json.code === 200 && json.data) dbData = json.data;
    }

    // Render
    if (dictRes.status === 'fulfilled' && dictRes.value.ok) {
      const dictData = await dictRes.value.json();
      renderResult(dictData, dbData);
    } else if (dictRes.status === 'fulfilled' && dictRes.value.status === 404) {
      // No dictionary entry, but we might have translation from backend
      if (dbData && dbData.chinese) {
        area.innerHTML = `<div class="result-card">
          <div class="word-head"><div class="word-title">${escapeHtml(searchWord)}</div></div>
          <div class="quick-meaning">${escapeHtml(dbData.chinese)}</div>
        </div>`;
      } else {
        area.innerHTML = '<div class="error-msg">未找到该单词的定义</div>';
      }
    } else {
      // Dictionary API unreachable, fall back to backend data if available
      if (dbData && dbData.chinese) {
        area.innerHTML = `<div class="result-card">
          <div class="word-head"><div class="word-title">${escapeHtml(searchWord)}</div></div>
          <div class="quick-meaning">${escapeHtml(dbData.chinese)}</div>
          <div style="font-size:0.78rem;color:#999;margin-top:8px;">（词典服务暂不可用）</div>
        </div>`;
      } else {
        area.innerHTML = '<div class="error-msg">词典服务暂不可用，请稍后重试</div>';
      }
    }

    loadTopWords();
  } finally {
    btn.disabled = false;
    btn.textContent = '查 询';
  }
}

async function renderResult(entries, dbData) {
  if (!entries || entries.length === 0) return;
  const word = entries[0].word;
  const firstEntry = entries[0];
  const phonetic = firstEntry.phonetic || (firstEntry.phonetics && firstEntry.phonetics[0] && firstEntry.phonetics[0].text) || '';
  const audioUrl = (firstEntry.phonetics || []).reduce((url, p) => url || (p.audio || ''), '') || '';

  // Collect POS tags and examples from all entries
  const posSet = new Set();
  const allExamples = [];
  for (const entry of entries) {
    for (const meaning of entry.meanings || []) {
      if (meaning.partOfSpeech) posSet.add(meaning.partOfSpeech);
      for (const def of meaning.definitions || []) {
        if (def.example) allExamples.push(def.example);
      }
    }
  }
  const posTags = [...posSet];

  // Fallback meaning from translate endpoint when dbData.fullChinese missing
  let fallbackMeaning = '';
  if (!dbData || !dbData.fullChinese) {
    try {
      const tRes = await fetch(`${API}/api/words/translate?word=${encodeURIComponent(word)}`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (tRes.ok) {
        const tData = await tRes.json();
        if (tData.code === 200 && tData.data) {
          fallbackMeaning = formatDictBrief(tData.data);
        }
      }
    } catch(e) {}
  }

  // Build the single merged card (without relations or examples, loaded async)
  let html = '<div class="result-card">';
  html += `<div class="word-head">
    <div class="word-title">${escapeHtml(word)}</div>
    ${phonetic ? `<div class="phonetic">/${phonetic}/ ${audioUrl ? `<button class="speaker-btn" onclick="playAudio('${escapeHtml(audioUrl)}')" title="播放发音">🔊</button>` : ''}</div>` : (audioUrl ? `<button class="speaker-btn" onclick="playAudio('${escapeHtml(audioUrl)}')" title="播放发音">🔊</button>` : '')}
  </div>`;

  // Line 1: POS + Chinese (collapsible)
  const meaningText = (dbData && dbData.fullChinese) ? dbData.fullChinese : fallbackMeaning;
  html += '<div id="meaningCollapse" class="collapse-section">';
  if (meaningText) {
    html += '<div class="quick-meaning">';
    html += escapeHtml(meaningText);
    html += '</div>';
  }
  html += '</div>';
  html += '<div class="collapse-toggle-wrap"><button class="collapse-toggle-btn" onclick="toggleMeaning()">收起释意 ▴</button></div>';

  // Related words placeholder (filled async)
  html += '<div id="relCollapse" class="collapse-section"><div class="loading-spin" style="padding: 12px 0; font-size: 0.85rem;"><div class="spinner"></div><div>加载关联词...</div></div></div>';
  html += '<div class="collapse-toggle-wrap" id="relToggleWrap" style="display:none"><button class="collapse-toggle-btn" onclick="toggleRelations()">收起关联词 ▴</button></div>';

  html += '<div id="examplesPlaceholder"><div class="loading-spin" style="padding: 12px 0; font-size: 0.85rem;"><div class="spinner"></div><div>加载例句...</div></div></div>';
  html += '</div>'; // close card
  document.getElementById('resultArea').innerHTML = html;

  const uniqueExamples = [...new Set(allExamples)].slice(0, 5);

  // Load relations (Datamuse) and examples in parallel
  const card = document.querySelector('#resultArea .result-card');
  if (!card) return;

  let relWords = [];
  try {
    const dmRes = await fetch(`https://api.datamuse.com/words?rel_trg=${encodeURIComponent(word)}&max=8`);
    if (dmRes.ok) {
      const dmData = await dmRes.json();
      relWords = dmData.map(d => d.word).filter(w => w !== word);
    }
  } catch(e) {}

  // Fetch Chinese for relation words + translate examples in parallel
  const relChinesePromises = relWords.map(w =>
    fetch(`${API}/api/words/translate?word=${encodeURIComponent(w)}`, {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => r.ok ? r.json() : null)
  );

  const exampleTranslatePromises = uniqueExamples.map(ex =>
    api(`${API}/api/translate`, {
      method: 'POST',
      body: JSON.stringify({ text: ex, from: 'en', to: 'zh' })
    }).catch(() => null)
  );

  const [relResults, exTransResults] = await Promise.all([
    Promise.all(relChinesePromises),
    Promise.all(exampleTranslatePromises)
  ]);

  // Build relation -> Chinese map
  const relMap = {};
  for (let i = 0; i < relWords.length; i++) {
    const r = relResults[i];
    relMap[relWords[i]] = (r && r.code === 200 && r.data) ? formatDictBrief(r.data) : '';
  }

  // Build example -> Chinese map
  const exChineseMap = {};
  for (let i = 0; i < uniqueExamples.length; i++) {
    const t = exTransResults[i];
    exChineseMap[uniqueExamples[i]] = (t && t.code === 200 && t.data && t.data.translation) ? t.data.translation : '';
  }

  // Collect content words from examples for meaning map
  const wordSet = new Set();
  for (const ex of uniqueExamples) {
    for (let t of ex.split(/[\s,.!?;:"]+/)) {
      t = t.replace(/[^a-zA-Z0-9-]/g, '').toLowerCase();
      if (t.length > 2 && !stopwordsRe.test(t)) wordSet.add(t);
    }
  }

  const wordArr = [...wordSet];
  const meaningPromises = wordArr.map(w =>
    fetch(`${API}/api/words/translate?word=${encodeURIComponent(w)}`, {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => r.ok ? r.json() : null)
  );
  const meaningResults = await Promise.all(meaningPromises);
  const meaningMap = {};
  for (let i = 0; i < wordArr.length; i++) {
    const m = meaningResults[i];
    meaningMap[wordArr[i]] = (m && m.code === 200 && m.data) ? formatDictBrief(m.data) : '';
  }

  // Build related words (inside collapse) and examples (outside collapse)
  let relHtml = '';
  if (relWords.length > 0) {
    relHtml += '<div class="related-words">';
    relHtml += '<span class="label">关联词:</span>';
    for (const rw of relWords) {
      const rch = relMap[rw] || '';
      relHtml += `<span class="rel-tag" onclick="event.stopPropagation();lookupWord('${escapeHtml(rw)}')">${escapeHtml(rw)}${rch ? ' ' + escapeHtml(rch) : ''}</span>`;
    }
    relHtml += '</div>';
  }

  let exHtml = '';
  if (uniqueExamples.length > 0) {
    exHtml += '<div class="examples-section">';
    exHtml += '<span class="section-label">例句</span>';
    for (const ex of uniqueExamples) {
      exHtml += '<div class="example-item">';
      const tokens = ex.split(/([\s,.!?;:"]+)/);
      let textHtml = '';
      for (const token of tokens) {
        if (!token || /^\s+$/.test(token)) {
          textHtml += token;
        } else if (/^[,.!?;:"]+$/.test(token)) {
          textHtml += `<span class="sword punct">${escapeHtml(token)}</span>`;
        } else {
          const clean = token.replace(/[^a-zA-Z0-9-]/g, '').toLowerCase();
          const meaning = meaningMap[clean] || '';
          textHtml += `<span class="sword" data-word="${escapeHtml(clean)}" data-meaning="${escapeHtml(meaning)}" onmouseenter="showTooltip(event, this)" onmouseleave="hideTooltip()" onclick="lookupWord('${escapeHtml(clean)}')">${escapeHtml(token)}</span>`;
        }
      }
      exHtml += `<div class="example-text">${textHtml}</div>`;
      if (exChineseMap[ex]) {
        exHtml += `<div class="example-translation">${escapeHtml(exChineseMap[ex])}</div>`;
      }
      exHtml += '</div>';
    }
    exHtml += '</div>';
  }

  const relCollapse = document.getElementById('relCollapse');
  if (relCollapse) {
    if (relHtml) {
      relCollapse.innerHTML = relHtml + '<div style="height:1px"></div>';
      document.getElementById('relToggleWrap').style.display = 'block';
    } else {
      relCollapse.innerHTML = '';
    }
  }
  const exPlaceholder = document.getElementById('examplesPlaceholder');
  if (exPlaceholder) {
    exPlaceholder.innerHTML = exHtml || '';
  }
  }

// =============================================
//  Sentence Translation (called by doSearch)
// =============================================
async function translateSentence() {
  const input = document.getElementById('wordInput');
  const text = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('searchBtn');
  const area = document.getElementById('sentenceArea');
  document.getElementById('resultArea').innerHTML = '';
  btn.disabled = true;
  btn.textContent = '翻译中...';
  area.innerHTML = '<div class="loading-spin"><div class="spinner"></div><div>正在翻译...</div></div>';

  try {
    const isZh = isChinese(text);
    const data = await api(`${API}/api/translate/sentence`, {
      method: 'POST',
      body: JSON.stringify({ text, from: isZh ? 'zh' : 'en', to: isZh ? 'en' : 'zh' })
    });

    if (data.code !== 200 || !data.data) {
      area.innerHTML = '<div class="error-msg">翻译失败，请重试</div>';
      return;
    }

    const { original, translated, words } = data.data;

    // Build meaning map from backend word list (for original text)
    const origMap = {};
    for (const w of (words || [])) {
      origMap[w.word.toLowerCase()] = w.chinese || '';
    }

    // If translated text is English, fetch word meanings for it
    const transMap = {};
    if (isZh) {
      const transTokens = translated.split(/[\s,.!?;:]+/)
        .map(t => t.replace(/[^a-zA-Z0-9-]/g, '').toLowerCase())
        .filter(t => t.length > 2 && !stopwordsRe.test(t));
      const uniqueTokens = [...new Set(transTokens)];
      const results = await Promise.allSettled(
        uniqueTokens.map(w =>
          fetch(`${API}/api/words/translate?word=${encodeURIComponent(w)}`, {
            headers: { 'Authorization': 'Bearer ' + token }
          }).then(r => r.ok ? r.json() : null)
        )
      );
      for (let i = 0; i < uniqueTokens.length; i++) {
        const r = results[i];
        transMap[uniqueTokens[i]] = (r.status === 'fulfilled' && r.value && r.value.code === 200 && r.value.data) ? formatDictBrief(r.value.data) : '';
      }
    }

    const originalHtml = buildInteractiveHtml(original, isZh ? {} : origMap);
    const translatedHtml = buildInteractiveHtml(translated, isZh ? transMap : {});

    area.innerHTML = `
      <div class="sentence-result">
        <div class="sentence-original">${originalHtml}</div>
        <div class="sentence-translation">
          <span class="label">翻译</span>
          ${translatedHtml}
        </div>
      </div>`;
  } catch(e) {
    area.innerHTML = '<div class="error-msg">翻译失败，请检查网络</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '查 询';
    loadSentenceHistory();
  }
}

    ).join('');

function buildInteractiveHtml(text, meaningMap) {
  if (isChinese(text)) return escapeHtml(text);

  let html = '';
  const tokens = text.split(/([\s,.!?;:]+)/);
  for (const token of tokens) {
    if (!token || /^\s+$/.test(token)) {
      html += token;
    } else if (/^[,.!?;:]+$/.test(token)) {
      html += `<span class="sword punct">${escapeHtml(token)}</span>`;
    } else {
      const clean = token.replace(/[^a-zA-Z0-9-]/g, '').toLowerCase();
      const meaning = meaningMap[clean] || '';
      html += `<span class="sword" data-word="${escapeHtml(clean)}" data-meaning="${escapeHtml(meaning)}" onmouseenter="showTooltip(event, this)" onmouseleave="hideTooltip()" onclick="lookupWord('${escapeHtml(clean)}')">${escapeHtml(token)}</span>`;
    }
  }
  return html;
}


// ---- Tooltip ----
function clampTip(tip, cx, cy) {
  let left = cx + 12;
  const rect = tip.getBoundingClientRect();
  const overflow = left + rect.width - window.innerWidth;
  if (overflow > 0) left = Math.max(0, left - overflow - 8);
  tip.style.left = left + 'px';
  tip.style.top = (cy - 36) + 'px';
}

function showTooltip(e, el) {
  const meaning = el.dataset.meaning;
  if (!meaning) return;
  const tip = document.getElementById('wordTooltip');
  tip.textContent = meaning;
  tip.style.opacity = '1';
  tip.style.left = '-9999px'; // off-screen first to measure
  tip.style.top = '-9999px';
  requestAnimationFrame(() => clampTip(tip, e.clientX, e.clientY));
}

function hideTooltip() {
  document.getElementById('wordTooltip').style.opacity = '0';
}

function showTooltipAtElement(el) {
  var meaning = el.dataset.meaning;
  if (!meaning) return;
  var tip = document.getElementById('wordTooltip');
  tip.textContent = meaning;
  tip.style.opacity = '1';
  var rect = el.getBoundingClientRect();
  var left = Math.min(rect.left, window.innerWidth - 270);
  tip.style.left = left + 'px';
  tip.style.top = (rect.bottom + 6) + 'px';
}

// mobile touch: first tap shows tooltip, second tap opens sidebar
document.addEventListener('click', function(e) {
  var sword = e.target.closest('.sword:not(.punct)');
  if (!sword) {
    if (_mobileTooltipWord) {
      hideTooltip();
      _mobileTooltipWord = null;
      clearTimeout(_mobileTooltipTimer);
    }
    return;
  }
  var isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  if (!isTouch) return;
  var meaning = sword.dataset.meaning;
  if (!meaning) return;
  var word = sword.dataset.word;
  if (_mobileTooltipWord === word) {
    _mobileTooltipWord = null;
    hideTooltip();
    clearTimeout(_mobileTooltipTimer);
    return;
  }
  e.stopPropagation();
  e.stopImmediatePropagation();
  e.preventDefault();
  _mobileTooltipWord = word;
  showTooltipAtElement(sword);
  clearTimeout(_mobileTooltipTimer);
  _mobileTooltipTimer = setTimeout(function() {
    hideTooltip();
    _mobileTooltipWord = null;
  }, 4000);
}, true);

document.addEventListener('mousemove', e => {
  const tip = document.getElementById('wordTooltip');
  if (tip.style.opacity === '1') {
    clampTip(tip, e.clientX, e.clientY);
  }
});

      if (json.code === 200 && json.data) dbData = json.data;
    }
    if (dictRes.status === 'fulfilled' && dictRes.value.ok) {
      dictData = await dictRes.value.json();
    }

    renderSidebar(word, dictData, dbData);
  } catch(e) {
    content.innerHTML = '<div class="error-msg">加载失败</div>';
  }
}

function renderSidebar(word, dictData, dbData) {
  const content = document.getElementById('sidebarContent');
  const entry = dictData && dictData.length > 0 ? dictData[0] : null;
  const phonetic = entry ? (entry.phonetic || (entry.phonetics && entry.phonetics[0] && entry.phonetics[0].text) || '') : '';

  let html = `<div class="word-title">${escapeHtml(word)} <button class="sidebar-expand" onclick="expandToSearch('${escapeHtml(word)}')" title="在查词页打开">↗</button></div>`;
  if (phonetic) html += `<div class="phonetic">/${phonetic}/</div>`;

  if (dbData && dbData.fullChinese) {
    html += '<div class="quick-meaning">' + escapeHtml(dbData.fullChinese) + '</div>';
  }

  if (dictData && dictData.length > 0) {
    const allExamples = [];
    for (const e of dictData) {
      for (const meaning of e.meanings || []) {
        for (const def of meaning.definitions || []) {
          if (def.example) allExamples.push(def.example);
        }
      }
    }
    const uniqueExamples = [...new Set(allExamples)].slice(0, 5);
    if (uniqueExamples.length > 0) {
      html += '<div class="examples-section">';
      html += '<span class="section-label">例句</span>';
      for (let i = 0; i < uniqueExamples.length; i++) {
        const ex = uniqueExamples[i];
        html += '<div class="example-item"><div class="example-text">' + escapeHtml(ex) + '</div><div class="example-translation" id="sb-ex-' + i + '"></div></div>';
      }
      html += '</div>';
    }
  }

  if (!dictData && (!dbData || !dbData.fullChinese)) {
    html += '<div class="error-msg">暂无详细释义</div>';
  }

  content.innerHTML = html;

  if (dictData && dictData.length > 0) {
    loadSidebarExampleTranslations(dictData);
  }
}

async function loadSidebarExampleTranslations(dictData) {
  const allExamples = [];
  for (const e of dictData) {
    for (const meaning of e.meanings || []) {
      for (const def of meaning.definitions || []) {
        if (def.example) allExamples.push(def.example);
      }
    }
  }
  const uniqueExamples = [...new Set(allExamples)].slice(0, 5);
  if (uniqueExamples.length === 0) return;

  const wordSet = new Set();
  for (const ex of uniqueExamples) {
    for (let t of ex.split(/[\s,.!?;:"]+/)) {
      t = t.replace(/[^a-zA-Z0-9-]/g, '').toLowerCase();
      if (t.length > 2 && !stopwordsRe.test(t)) wordSet.add(t);
    }
  }
  const wordArr = [...wordSet];

  const [transResults, mResults] = await Promise.all([
    Promise.allSettled(
      uniqueExamples.map(ex =>
        api(`${API}/api/translate`, {
          method: 'POST',
          body: JSON.stringify({ text: ex, from: 'en', to: 'zh' })
        }).catch(() => null)
      )
    ),
    Promise.allSettled(
      wordArr.map(w =>
        fetch(`${API}/api/words/translate?word=${encodeURIComponent(w)}`, {
          headers: { 'Authorization': 'Bearer ' + token }
        }).then(r => r.ok ? r.json() : null)
      )
    )
  ]);

  const meaningMap = {};
  for (let i = 0; i < wordArr.length; i++) {
    const m = mResults[i];
    meaningMap[wordArr[i]] = (m.status === 'fulfilled' && m.value && m.value.code === 200 && m.value.data) ? formatDictBrief(m.value.data) : '';
  }

  for (let i = 0; i < uniqueExamples.length; i++) {
    const transEl = document.getElementById('sb-ex-' + i);
    const r = transResults[i];
    if (transEl && r.status === 'fulfilled' && r.value && r.value.code === 200 && r.value.data) {
      transEl.textContent = r.value.data.translation;
    }
    const textEl = transEl && transEl.previousElementSibling;
    if (textEl && textEl.classList.contains('example-text')) {
      textEl.innerHTML = buildInteractiveHtml(uniqueExamples[i], meaningMap);
    }
  }
}

function renderWordbookTbody(data) {
  const tbody = document.querySelector('#wordbookArea tbody');
  if (!tbody) return;
  const rows = data.map((w, i) => dictationMode
    ? `<tr class="dict-row" data-word="${escapeHtml(w.word)}" data-count="${w.count}">
        <td class="dict-cell">
          <input class="dict-input" data-index="${i}" autocomplete="off" autocapitalize="off" spellcheck="false"
            onkeydown="dictKeyHandler(event,this,'${escapeHtml(w.word)}',${i})">
          <div class="dict-result" id="dictRes${i}"></div>
          <div class="dict-hint">Ctrl+Enter 跳过</div>
        </td>
        <td style="color:var(--ink-light);font-size:0.85rem;">${renderChineseCell(w.chinese || '—', hideChinese)}</td>
        <td style="color:#999;font-size:0.82rem;">${w.count} 次</td>
        <td style="font-size:0.82rem;color:#2e7d32;">${formatRate(w)}</td>
        <td><button class="btn-delete-row" onclick="event.stopPropagation();deleteWord('${escapeHtml(w.word)}')">&times;</button></td>
      </tr>`
    : `<tr onclick="searchWord('${escapeHtml(w.word)}')">
        <td style="font-weight:600;">${escapeHtml(w.word)}</td>
        <td style="color:var(--ink-light);font-size:0.85rem;">${renderChineseCell(w.chinese || '—', hideChinese)}</td>
        <td style="color:#999;font-size:0.82rem;">${w.count} 次</td>
        <td style="font-size:0.82rem;color:#2e7d32;">${formatRate(w)}</td>
        <td><button class="btn-delete-row" onclick="event.stopPropagation();deleteWord('${escapeHtml(w.word)}')">&times;</button></td>
      </tr>`
  ).join('');
  tbody.innerHTML = rows;
  if (dictationMode) {
    setTimeout(() => {
      const first = document.querySelector('.dict-input[data-index="0"]');
      if (first) first.focus();
    }, 100);
  }
}

function filterWordbook(keyword) {
  clearTimeout(_wbSearchTimer);
  _wbSearchTimer = setTimeout(() => {
    const kw = keyword.trim();
    if (!kw) {
      renderWordbookTbody(_wordbookData);
      return;
    }
    const isChinese = /[一-龥]/.test(kw);
    const filtered = _wordbookData.filter(w =>
      isChinese ? (w.chinese || '').includes(kw) : w.word.toLowerCase().includes(kw.toLowerCase())
    );
    renderWordbookTbody(filtered);
  }, 300);
}

function copyInviteCode(code, btn) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(function() {
      btn.textContent = '已复制';
      setTimeout(function() { btn.textContent = '复制'; }, 1500);
    }).catch(function() {
      btn.textContent = '复制失败';
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = code;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); btn.textContent = '已复制'; }
    catch(e) { btn.textContent = '复制失败'; }
    document.body.removeChild(ta);
    setTimeout(function() { btn.textContent = '复制'; }, 1500);
  }
}

function formatRate(w) {
  if (!w.dictTotal || w.dictTotal === 0) return '-';
  const pct = Math.round(w.dictCorrect / w.dictTotal * 100);
  return pct + '%';
}

function renderChineseCell(text, hidden) {
  if (!text || text === '-') return hidden ? '' : '<div>—</div>';
  return text.split('\n').map(line => {
    const m = line.match(/^([a-z]+\.) (.+)$/);
    if (m) {
      return '<div>' + escapeHtml(m[1]) + ' <span class="cn-text' + (hidden ? ' cn-hidden' : '') + '">' + escapeHtml(m[2]) + '</span></div>';
    }
    return '<div><span class="cn-text' + (hidden ? ' cn-hidden' : '') + '">' + escapeHtml(line) + '</span></div>';
  }).join('');
}

function dictKeyHandler(event, input, word, idx) {
  if (event.key === 'Enter' && event.ctrlKey) {
    event.preventDefault();
    input.value = word;
    input.classList.add('correct');
    input.style.color = '#2e7d32';
    input.disabled = true;
    var resDiv = document.getElementById('dictRes' + idx);
    if (resDiv) {
      resDiv.className = 'dict-result correct';
      resDiv.textContent = '⊙ 已跳过';
    }
    try {
      fetch(API + '/api/words/dictation?word=' + encodeURIComponent(word) + '&correct=false', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
      });
    } catch(e) {}
    setTimeout(function() {
      var next = document.querySelector('.dict-input[data-index="' + (idx + 1) + '"]');
      if (next) next.focus();
    }, 300);
  } else if (event.key === 'Enter') {
    event.preventDefault();
    checkSpelling(input, word, idx);
  } else if (event.key === 'Tab') {
    event.preventDefault();
    var next = document.querySelector('.dict-input[data-index="' + (idx + 1) + '"]');
    if (next) { next.focus(); } else {
      var first = document.querySelector('.dict-input[data-index="0"]');
      if (first) first.focus();
    }
  }
}

async function checkSpelling(input, correctWord, idx) {
  const userInput = input.value.toLowerCase().trim();
  if (!userInput) return;
  const resDiv = document.getElementById('dictRes' + idx);
  const isCorrect = userInput === correctWord.toLowerCase();

  if (isCorrect) {
    input.classList.add('correct');
    input.disabled = true;
    input.style.color = '#2e7d32';
    resDiv.className = 'dict-result correct';
    resDiv.textContent = '✓ 正确';
    setTimeout(function() {
      var next = document.querySelector('.dict-input[data-index="' + (idx + 1) + '"]');
      if (next) next.focus();
    }, 300);
  } else {
    input.classList.add('error');
    input.value = '';
    const diff = wordDiff(userInput, correctWord);
    resDiv.className = 'dict-result error';
    resDiv.innerHTML = `<div style="text-decoration:line-through;color:#888;margin-bottom:2px;">${escapeHtml(diff.userLine)}</div>
      <div>${escapeHtml(diff.correctLine)}</div>
      <div class="marker-line">${escapeHtml(diff.markers)}</div>`;
    setTimeout(() => { input.classList.remove('error'); }, 400);
  }

  try {
    await fetch(`${API}/api/words/dictation?word=${encodeURIComponent(correctWord)}&correct=${isCorrect}`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    });
  } catch(e) {}
}

function wordDiff(userInput, correct) {
  const maxLen = Math.max(userInput.length, correct.length);
  let userLine = '', correctLine = '', markers = '';
  for (let i = 0; i < maxLen; i++) {
    const uc = userInput[i] || '';
    const cc = correct[i] || '';
    userLine += uc || ' ';
    correctLine += cc || ' ';
    markers += (uc.toLowerCase() === cc.toLowerCase()) ? ' ' : '^';
  }
  return { userLine, correctLine, markers };
}

function formatDictBrief(dict) {
  if (!dict || !dict.meanings || !dict.meanings.length) return '';
  return dict.meanings.map(line => {
    const m = line.match(/^([a-z]+\.)\s*(.+)$/i);
    if (m) {
      const parts = m[2].split(/[；;]/).map(s => s.trim()).filter(Boolean).slice(0, 3);
      return m[1] + ' ' + parts.join('；');
    }
    return line;
  }).join('\n');
}

function escapeHtml(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let _examplesAllCollapsed = true;

async function fetchExpandedData(words) {
  const tasks = words.map(word =>
    Promise.allSettled([
      fetch(`${API}/api/words?word=${encodeURIComponent(word)}`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(r => r.ok ? r.json() : null),
      fetch(`${DICT}/${encodeURIComponent(word)}`).then(r => r.ok ? r.json() : null)
    ]).then(([backendRes, dictRes]) => ({
      word,
      backendData: backendRes.status === 'fulfilled' ? backendRes.value : null,
      dictData: dictRes.status === 'fulfilled' ? dictRes.value : null
    }))
  );
  const results = await Promise.allSettled(tasks);
  const cache = {};
  const exToTranslate = [];

  for (const r of results) {
    if (r.status !== 'fulfilled' || !r.value) continue;
    const { word, backendData, dictData } = r.value;
    const fullChinese = backendData && backendData.code === 200 && backendData.data
      ? (backendData.data.fullChinese || backendData.data.chinese) : null;
    const posGroups = {};
    if (fullChinese) {
      const lines = fullChinese.split('\n').filter(l => l.trim());
      for (const line of lines) {
        const m = line.match(/^([a-z]+\.)\s*(.+)$/i);
        if (m) {
          const pos = m[1];
          const meanings = m[2].split(/[；;]/).map(s => s.trim()).filter(Boolean);
          if (!posGroups[pos]) posGroups[pos] = [];
          posGroups[pos].push(...meanings);
        }
      }
      for (const pos in posGroups) { posGroups[pos] = posGroups[pos].slice(0, 3); }
    }
    const examples = [];
    if (dictData && Array.isArray(dictData)) {
      for (const entry of dictData) {
        for (const meaning of entry.meanings || []) {
          for (const def of meaning.definitions || []) {
            if (def.example && !examples.includes(def.example)) examples.push(def.example);
            if (examples.length >= 3) break;
          }
          if (examples.length >= 3) break;
        }
        if (examples.length >= 3) break;
      }
    }
    for (const ex of examples) {
      if (!exToTranslate.some(e => e.text === ex)) exToTranslate.push({ text: ex });
    }
    cache[word] = { posGroups, examples };
  }
  const transMap = {};
  if (exToTranslate.length > 0) {
    const transResults = await Promise.allSettled(
      exToTranslate.map(e =>
        api(`${API}/api/translate`, {
          method: 'POST',
          body: JSON.stringify({ text: e.text, from: 'en', to: 'zh' })
        }).catch(() => null)
      )
    );
    for (let i = 0; i < exToTranslate.length; i++) {
      const t = transResults[i];
      if (t.status === 'fulfilled' && t.value && t.value.code === 200 && t.value.data) {
        transMap[exToTranslate[i].text] = t.value.data.translation;
      }
    }
  }
  const wordSet = new Set();
  for (const w in cache) {
    for (const ex of cache[w].examples) {
      for (let t of ex.split(/[\s,.!?;:"]+/)) {
        t = t.replace(/[^a-zA-Z0-9-]/g, '').toLowerCase();
        if (t.length > 2 && !stopwordsRe.test(t)) wordSet.add(t);
      }
    }
  }
  const wordArr = [...wordSet];
  const meaningMap = {};
  if (wordArr.length > 0) {
    const mResults = await Promise.allSettled(
      wordArr.map(w =>
        fetch(`${API}/api/words/translate?word=${encodeURIComponent(w)}`, {
          headers: { 'Authorization': 'Bearer ' + token }
        }).then(r => r.ok ? r.json() : null)
      )
    );
    for (let i = 0; i < wordArr.length; i++) {
      const m = mResults[i];
      meaningMap[wordArr[i]] = (m.status === 'fulfilled' && m.value && m.value.code === 200 && m.value.data) ? formatDictBrief(m.value.data) : '';
    }
  }
  return { cache, transMap, meaningMap };
}

async function loadQuizExamples() {
  const wraps = document.querySelectorAll('#quizRecordList .qr-ex-wrap');
  const words = [];
  for (const w of wraps) { words.push(w.dataset.word); }
  if (!words.length) return;

  try {
    const res = await fetch(`${API}/api/quiz/progress`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (data.code !== 200) return;
    const wrong = (data.data.wrong || []).map(w => w.word);

    const cacheRes = await fetchExpandedData(wrong);
    const { cache, transMap, meaningMap } = cacheRes;

    for (const w of wraps) {
      const word = w.dataset.word;
      const entry = cache[word];
      if (!entry) continue;

      const dictEl = w.parentElement.querySelector('.qr-dict-en');

          h += '<span class="qr-def-text">' + escapeHtml(entry.posGroups[pos].join('；')) + '</span>';
          h += '</div>';
        }
        h += '</div>';
        dictEl.innerHTML = h;
        const meaningEl = dictEl.parentElement.querySelector('.qr-meaning');
        if (meaningEl) meaningEl.style.display = 'none';
      }

      const exDiv = w.querySelector('.qr-examples');
      const toggleBtn = w.querySelector('.qr-ex-toggle');
      if (entry.examples.length > 0) {
        let exHtml = '';
        for (const ex of entry.examples) {
          exHtml += '<div class="qr-ex-item">';
          exHtml += '<div class="qr-ex-text">' + buildInteractiveHtml(ex, meaningMap) + '</div>';
          if (transMap[ex]) {
            exHtml += '<div class="qr-ex-trans">' + escapeHtml(transMap[ex]) + '</div>';
          }
          exHtml += '</div>';
        }
        exDiv.innerHTML = exHtml;
      } else {
        if (toggleBtn) toggleBtn.style.display = 'none';
      }
    }
  } catch(e) {}
}

async function startQuiz() {
  try {
    showSpinner(document.getElementById('quizDefault'), '生成题目中...');
    if (quizMode === 'mixed') {
      const [res1, res2] = await Promise.all([
        fetch(`${API}/api/quiz/generate?mode=cn2en`, { headers: { 'Authorization': 'Bearer ' + token } }),
        fetch(`${API}/api/quiz/generate?mode=en2cn`, { headers: { 'Authorization': 'Bearer ' + token } })
      ]);
      const data1 = await res1.json();
      const data2 = await res2.json();
      const q1 = (data1.data && data1.data.questions || []).slice(0, 10);
      const q2 = (data2.data && data2.data.questions || []).slice(0, 10);
      quizQuestions = shuffleArray([...q1, ...q2]);
    } else {
      const res = await fetch(`${API}/api/quiz/generate?mode=${quizMode}`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      if (data.code !== 200) return;
      quizQuestions = data.data.questions;
    }
    if (!quizQuestions || quizQuestions.length === 0) {
      showToast('词库中没有足够的单词，请先导入六级词库');
      loadQuizChart();
      return;
    }
    quizIndex = 0;
    quizCorrectCount = 0;
    quizAnswers = new Array(quizQuestions.length).fill(null);
    document.getElementById('quizDefault').style.display = 'none';
    document.getElementById('quizImmersive').classList.add('active');
    renderQuizQuestion();
    attachQuizKeyboard();
    attachQuizSwipe();
  } catch(e) { showToast('加载题目失败'); loadQuizChart(); }
}

function renderQuizQuestion() {
  clearTimeout(quizAdvanceTimer);
  if (quizIndex >= quizQuestions.length) {
    detachQuizKeyboard();
    finishQuiz();
    return;
  }
  const q = quizQuestions[quizIndex];
  const ans = quizAnswers[quizIndex];
  document.getElementById('quizProgress').textContent = `第 ${quizIndex + 1}/${quizQuestions.length} 题`;
  const card = document.getElementById('quizCard');
  card.style.transition = 'none';
  card.style.transform = '';
  card.classList.remove('swiping');

  // update prev/next buttons
  document.getElementById('quizPrevBtn').disabled = (quizIndex === 0);
  const isLastQ = quizIndex >= quizQuestions.length - 1;
  document.getElementById('quizNextBtn').disabled = isLastQ ? !quizAnswers[quizIndex] : !quizAnswers[quizIndex];
  document.getElementById('quizNextBtn').textContent = isLastQ ? '完成 ✓' : '下一题 →';

  const isEn2Cn = q.mode === 'en2cn';
  let questionHtml, optionsHtml;

  if (isEn2Cn) {
    questionHtml = `<span class="pos-tag">${escapeHtml(q.pos || '')}</span>${escapeHtml(q.word)}`;
    optionsHtml = q.options.map((m, i) => {
      const escaped = escapeHtml(m);
      const meaningAttr = isEn2Cn ? '' : ` data-meaning="${escaped}"`;
      return `<button class="quiz-option" data-idx="${i}" data-word-id="${q.wordId}" data-chosen="${escaped}"${meaningAttr}>${escaped}<span class="opt-meaning"></span></button>`;
    }).join('');
  } else {
    questionHtml = `${escapeHtml(q.pos)} ${escapeHtml(q.meaning)}`;
    optionsHtml = q.options.map((w, i) => {
      const escaped = escapeHtml(w);
      return `<button class="quiz-option" data-idx="${i}" data-word-id="${q.wordId}" data-chosen="${escaped}">${escaped}<span class="opt-meaning"></span></button>`;
    }).join('');
  }

  card.innerHTML = `
    <div class="quiz-question-line">${questionHtml}</div>
    <div class="quiz-options" id="quizOptions">${optionsHtml}</div>`;

  // bind click
  document.querySelectorAll('#quizOptions .quiz-option').forEach(btn => {
    btn.addEventListener('click', function() { onOptionClick(this); });
  });

  // if already answered, show review state
  if (ans) {
    restoreAnsweredState(ans);
  }
}

function restoreAnsweredState(ans) {
  const q = quizQuestions[quizIndex];
  const correctAnswer = q.mode === 'en2cn' ? q.meaning : ans.correctWord;
  const allBtns = document.querySelectorAll('#quizOptions .quiz-option');
  allBtns.forEach(b => {
    if (b.dataset.chosen === correctAnswer) {
      b.classList.add('reveal-correct');
      if (!ans.correct) showOptionMeaning(b);
    }
    if (b.dataset.chosen === ans.chosen) {
      b.classList.add(ans.correct ? 'correct-pick' : 'wrong-pick');
      if (!ans.correct) showOptionMeaning(b);
    }
  });
}

function onOptionClick(btn) {
  const ans = quizAnswers[quizIndex];

  // already answered: cancel auto-advance, show meaning of clicked option
  if (ans) {
    clearTimeout(quizAdvanceTimer);
    quizAdvanceTimer = null;
    showOptionMeaning(btn);
    return;
  }

  // first answer
  const wordId = parseInt(btn.dataset.wordId);
  const chosen = btn.dataset.chosen;
  const q = quizQuestions[quizIndex];
  const mode = q.mode || quizMode;
  selectOption(btn, chosen, wordId, mode);
}

function showOptionMeaning(btn) {
  btn.classList.add('show-meaning');
  const meaningEl = btn.querySelector('.opt-meaning');
  if (!meaningEl) return;

  const q = quizQuestions[quizIndex];
  const idx = parseInt(btn.dataset.idx);
  if (q.mode === 'en2cn') {
    meaningEl.textContent = (q.optionWords && q.optionWords[idx]) || '';
  } else {
    meaningEl.textContent = (q.optionMeanings && q.optionMeanings[idx]) || '';
  }
}

async function selectOption(btn, chosen, wordId, mode) {
  clearTimeout(quizAdvanceTimer);
  try {
    const res = await fetch(`${API}/api/quiz/answer`, {
      method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ wordId: wordId, chosen: chosen, mode: mode })
    });
    const data = await res.json();
    const result = data.data;
    const correctWord = result.correctWord;
    const correct = result.correct;

    // save answer
    quizAnswers[quizIndex] = { chosen, correct, correctWord, wordId };
    // 答完即允许跳到下一题
    document.getElementById('quizNextBtn').disabled = (quizIndex >= quizQuestions.length - 1);

    // update correct count
    if (correct) quizCorrectCount++;

    // mark buttons
    const q = quizQuestions[quizIndex];
    const correctAnswer = q.mode === 'en2cn' ? q.meaning : result.correctWord;
    const allBtns = document.querySelectorAll('#quizOptions .quiz-option');
    allBtns.forEach(b => {
      if (b.dataset.chosen === correctAnswer) {
        b.classList.add('reveal-correct');
        if (!correct) showOptionMeaning(b);
      }
    });
    const isLast = quizIndex >= quizQuestions.length - 1;
    if (correct) {
      btn.classList.add('correct-pick');
      quizAdvanceTimer = setTimeout(() => {
        quizAdvanceTimer = null;
        if (isLast) finishQuiz();
        else goToQuestion(quizIndex + 1);
      }, 1500);
    } else {
      btn.classList.add('wrong-pick');
      showOptionMeaning(btn);
      if (isLast) {
        quizAdvanceTimer = setTimeout(() => {
          quizAdvanceTimer = null;
          finishQuiz();
        }, 2000);
      }
    }
  } catch(e) {}
}

function goToQuestion(idx) {
  if (idx < 0 || idx >= quizQuestions.length) return;
  clearTimeout(quizAdvanceTimer);
  quizAdvanceTimer = null;
  // reset card transform from swipe
  const card = document.getElementById('quizCard');
  card.style.transition = 'none';
  card.style.transform = '';
  card.classList.remove('swiping');
  quizIndex = idx;
  renderQuizQuestion();
  // if going to unanswered latest question, focus
  if (!quizAnswers[quizIndex]) {
    setTimeout(() => {
      const firstBtn = document.querySelector('#quizOptions .quiz-option');
      if (firstBtn) firstBtn.focus();
    }, 100);
  }
}

function prevQuestion() {
  if (quizIndex > 0) goToQuestion(quizIndex - 1);
}

function nextQuestion() {
  if (!quizAnswers[quizIndex]) return;
  if (quizIndex >= quizQuestions.length - 1) { finishQuiz(); return; }
  goToQuestion(quizIndex + 1);
}

// ---- keyboard ----
function _quizKeyHandler(e) {
  if (!document.getElementById('quizImmersive').classList.contains('active')) return;
  if (document.getElementById('resultOverlay').classList.contains('show')) return;

  if (e.key >= '1' && e.key <= '4') {
    e.preventDefault();
    const idx = parseInt(e.key) - 1;
    const btns = document.querySelectorAll('#quizOptions .quiz-option');
    if (btns[idx]) {
      if (quizAnswers[quizIndex]) {
        clearTimeout(quizAdvanceTimer);
        quizAdvanceTimer = null;
        showOptionMeaning(btns[idx]);
      } else {
        onOptionClick(btns[idx]);
      }
    }
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    prevQuestion();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    nextQuestion();
  }
}

function attachQuizKeyboard() {
  document.addEventListener('keydown', _quizKeyHandler);
}

function detachQuizKeyboard() {
  document.removeEventListener('keydown', _quizKeyHandler);
}

// ---- swipe gesture ----
let _swipeState = null;

function _onQuizTouchStart(e) {
  if (e.touches.length !== 1) { _swipeState = null; return; }
  if (!e.target.closest('#quizCard')) return;
  _swipeState = { startX: e.touches[0].clientX, startY: e.touches[0].clientY, deltaX: 0, dragging: false };
}

function _onQuizTouchMove(e) {
  if (!_swipeState) return;
  const dx = e.touches[0].clientX - _swipeState.startX;
  const dy = e.touches[0].clientY - _swipeState.startY;
  if (!_swipeState.dragging && Math.abs(dx) > 8 && Math.abs(dx) > Math.abs(dy) * 1.2) {
    _swipeState.dragging = true;
  }
  if (!_swipeState.dragging) return;
  e.preventDefault();
  _swipeState.deltaX = dx;
  const card = document.getElementById('quizCard');
  card.classList.add('swiping');
  card.style.transform = `translateX(${dx}px) rotate(${dx * 0.04}deg)`;
}

function _onQuizTouchEnd() {
  if (!_swipeState || !_swipeState.dragging) { _swipeState = null; return; }
  const card = document.getElementById('quizCard');
  const dx = _swipeState.deltaX;
  const threshold = Math.min(card.offsetWidth * 0.3, 120);
  _swipeState = null;
  card.classList.remove('swiping');

  if (dx < -threshold && quizAnswers[quizIndex]) {
    if (quizIndex >= quizQuestions.length - 1) {
      finishQuiz();
      return;
    }
    card.style.transition = 'transform 0.18s ease-in';
    card.style.transform = 'translateX(-130vw)';
    setTimeout(() => goToQuestion(quizIndex + 1), 180);
  } else if (dx > threshold && quizIndex > 0) {
    card.style.transition = 'transform 0.18s ease-in';
    card.style.transform = 'translateX(130vw)';
    setTimeout(() => goToQuestion(quizIndex - 1), 180);
  } else {
    card.style.transition = 'transform 0.25s ease-out';
    card.style.transform = '';
  }
}

function attachQuizSwipe() {
  const el = document.getElementById('quizImmersive');
  el.addEventListener('touchstart', _onQuizTouchStart, { passive: false });
  el.addEventListener('touchmove', _onQuizTouchMove, { passive: false });
  el.addEventListener('touchend', _onQuizTouchEnd);
}

function detachQuizSwipe() {
  const el = document.getElementById('quizImmersive');
  el.removeEventListener('touchstart', _onQuizTouchStart);
  el.removeEventListener('touchmove', _onQuizTouchMove);
  el.removeEventListener('touchend', _onQuizTouchEnd);
}

function finishQuiz() {
  detachQuizKeyboard();
  document.getElementById('quizImmersive').classList.remove('active');
  document.getElementById('quizDefault').style.display = 'block';

  fetch(`${API}/api/quiz/check-mastered`, {
    headers: { 'Authorization': 'Bearer ' + token }
  }).then(r => r.json()).then(d => {
    if (d.code === 200 && d.data === true) {
      startConfetti();
      setTimeout(() => showResultModal(true), 2000);
    } else {
      startConfetti();
      setTimeout(() => showResultModal(false), 2000);
    }
  });
  loadQuizTabContent();
}

function showResultModal(allMastered) {
  const total = quizQuestions.length;
  const correct = quizCorrectCount;
  const rate = Math.round(correct / total * 100);

  document.getElementById('resultScore').textContent = `答对 ${correct}/${total}`;

  if (allMastered) {
    document.getElementById('resultEmoji').textContent = '🏆';
    document.getElementById('resultTitle').textContent = '恭喜！全部掌握！';
    document.getElementById('resultMsg').textContent = '你已掌握全部六级词汇，进度已重置，继续加油！';
  } else if (rate === 100) {
    document.getElementById('resultEmoji').textContent = '🔥';
    document.getElementById('resultTitle').textContent = '太强了！全部正确！';
    document.getElementById('resultMsg').textContent = '这一轮完美通关！';
  } else if (rate >= 70) {
    document.getElementById('resultEmoji').textContent = '👏';
    document.getElementById('resultTitle').textContent = '不错！继续加油！';
    document.getElementById('resultMsg').textContent = `正确率 ${rate}%，再练练会更好！`;
  } else {
    document.getElementById('resultEmoji').textContent = '💪';
    document.getElementById('resultTitle').textContent = '别灰心！';
    document.getElementById('resultMsg').textContent = `正确率 ${rate}%，多看看错题再试试！`;
  }

  document.getElementById('resultOverlay').classList.add('show');

  if (allMastered) {
    fetch(`${API}/api/quiz/reset`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }).catch(e => {});
  }
}

function backFromResult() {
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('confettiCanvas').classList.remove('active');
  loadQuizProgress();
  loadQuizChart();
}

function continueQuiz() {
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('confettiCanvas').classList.remove('active');
  startQuiz();
}

// ---- 彩带动画 ----
function startConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  canvas.classList.add('active');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#4a6fa5','#c9a96e','#5b9a68','#d4685c','#8fadcf','#f0c060','#7eb88e','#e8958b'];
  const particles = [];
  for (let i = 0; i < 120; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 10 + 6,
      h: Math.random() * 6 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 3 + 2,
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 10
    });
  }
  let frame = 0;
  function draw() {
    if (frame > 150) { canvas.classList.remove('active'); return; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.rotation += p.rotSpeed;
    });
    frame++;
    requestAnimationFrame(draw);
  }
  draw();
}

// ---- profile sidebar & avatar ----
var _profileData = null;
var _avatarPalette = ['#4a90d9','#3cb371','#e07b5a','#8e6fc4','#d4838f','#5b9aa0','#d4a548','#6b8e4e','#c4726c','#5c8db5'];

function getAvatarColor(name) {
  if (!name) return _avatarPalette[0];
  var h = 0;
  for (var i = 0; i < name.length; i++) { h = name.charCodeAt(i) + ((h << 5) - h); }
  return _avatarPalette[Math.abs(h) % _avatarPalette.length];
}

function getInitial(name) {
  if (!name) return '?';
  var c = name.charAt(0);
  return /[a-zA-Z]/.test(c) ? c.toUpperCase() : c;
}

function updateHeaderAvatar(username, avatarUrl) {
  var el = document.getElementById('headerAvatarCircle');
  if (avatarUrl) {
    el.innerHTML = '<img class="header-avatar-img" src="' + avatarUrl + '" alt="">';
    el.style.background = '';
  } else {
    el.textContent = getInitial(username);
    el.style.background = getAvatarColor(username);
  }
}

function openProfileSidebar() {
  var sidebar = document.getElementById('profileSidebar');
  var overlay = document.getElementById('profileSidebarOverlay');
  sidebar.classList.add('show');
  overlay.classList.add('show');
  showSpinner(document.getElementById('profileSidebarContent'), '加载中...');
  fetch(API + '/api/user/me', {
    headers: { 'Authorization': 'Bearer ' + token }
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.code === 200) {
      _profileData = data.data;
      renderProfileSidebar(data.data);
    } else {
      showToast(data.msg || '获取资料失败');
    }
  });
}

function closeProfileSidebar() {
  document.getElementById('profileSidebar').classList.remove('show');
  document.getElementById('profileSidebarOverlay').classList.remove('show');
}

function renderProfileSidebar(profile) {
  var sidebar = document.getElementById('profileSidebar');
  var overlay = document.getElementById('profileSidebarOverlay');
  sidebar.classList.add('show');
  overlay.classList.add('show');

  var avatarUrl = profile.avatarUrl;
  var name = profile.username || '我的';
  var color = getAvatarColor(name);
  var initial = getInitial(name);
  var avatarHtml;
  if (avatarUrl) {
    avatarHtml = '<img class="profile-avatar-img" src="' + avatarUrl + '" alt="">' +
      '<div class="profile-avatar-overlay">📷</div>';
  } else {
    avatarHtml = '<div class="profile-avatar-circle" style="background:' + color + '">' + initial + '</div>' +
      '<div class="profile-avatar-overlay">📷</div>';
  }

  var role = profile.role || 'user';
  var roleTag = '';
  if (role === 'admin') roleTag = '<span class="profile-role-tag profile-role-admin">管理员</span>';
  else if (role === 'tester') roleTag = '<span class="profile-role-tag profile-role-tester">内测人</span>';
  else roleTag = '<span class="profile-role-tag">我的</span>';

  var testerBtns = '';
  if (role === 'admin' || role === 'tester') {
    testerBtns = '<button class="profile-btn" onclick="closeProfileSidebar();openInviteDialog()">🎟️ 我的邀请码</button>';
  }

  document.getElementById('profileSidebarContent').innerHTML =
    '<div class="profile-section">' +
    '<div class="profile-avatar-wrap" onclick="triggerAvatarUpload()">' + avatarHtml + '</div>' +
    '<div class="profile-name">' + escapeHtml(name) + '</div>' +
    '<div class="profile-email">' + escapeHtml(profile.email || '') + '</div>' +
    '<div class="profile-role-row">' + roleTag + '</div>' +
    '</div>' +
    '<div class="profile-divider"></div>' +
    '<button class="profile-btn" onclick="closeProfileSidebar();openFeedback()">💬 留言板</button>' +
    testerBtns +
    '<button class="profile-btn" onclick="closeProfileSidebar();openChangePassword()">🔑 修改密码</button>' +
    '<div class="profile-divider"></div>' +
    '<button class="profile-btn profile-btn-logout" onclick="logout()">退出登录</button>';
}

function triggerAvatarUpload() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = function() { uploadAvatar(input); };
  input.click();
}

function uploadAvatar(input) {
  var file = input.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { showToast('仅支持图片文件'); return; }
  if (file.size > 5 * 1024 * 1024) { showToast('图片大小不能超过5MB'); return; }
  showSpinner(document.getElementById('profileSidebarContent'), '上传中...');
  var formData = new FormData();
  formData.append('file', file);
  fetch(API + '/api/user/avatar', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token },
    body: formData
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.code === 200) {
      var url = data.data.avatarUrl;
      _profileData.avatarUrl = url;
      updateHeaderAvatar(_profileData.username, url);
      renderProfileSidebar(_profileData);
      showToast('头像已更新');
    } else {
      renderProfileSidebar(_profileData);
      showToast(data.msg || '上传失败');
    }
  }).catch(function(e) {
    renderProfileSidebar(_profileData);
    showToast('网络错误，请重试');
  });
}

function openChangePassword() {
  document.getElementById('pwdOld').value = '';
  document.getElementById('pwdNew').value = '';
  document.getElementById('pwdModal').style.display = 'flex';
}

function closeChangePassword() {
  document.getElementById('pwdModal').style.display = 'none';
}

function submitChangePassword() {
  var oldPwd = document.getElementById('pwdOld').value.trim();
  var newPwd = document.getElementById('pwdNew').value.trim();
  if (!oldPwd || !newPwd) { showToast('请填写旧密码和新密码'); return; }
  if (newPwd.length < 6) { showToast('新密码至少6位'); return; }
  var btn = document.getElementById('pwdSubmitBtn');
  btnLoading(btn, '修改中...');
  fetch(API + '/api/user/password', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.code === 200) {
      showToast('密码已修改');
      closeChangePassword();
      setTimeout(function() { logout(); }, 1500);
    } else {
      btnReset(btn);
      showToast(data.msg || '修改失败');
    }
  }).catch(function(e) {
    btnReset(btn);
    showToast('网络错误');
  });
}
